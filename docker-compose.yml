version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: profileforge-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    # We specify environment variables explicitly if we want to document them, 
    # but env_file handles this automatically. The container will flawlessly 
    # communicate with your managed Postgres and BullMQ Redis instances as long 
    # as their URIs are correctly defined in the .env file.
    environment:
      - NODE_ENV=${NODE_ENV:-production}
